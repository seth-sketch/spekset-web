<svg xmlns="http://www.w3.org/2000/svg" viewBox="130 72 1055 338" width="1055" height="338">
  <!-- speKset logo — transparent bg, Arial Black wordmark, #3a51a3 K, #4a8fff bracket -->

  <!-- Bracket: top bar, left vertical, partial bottom -->
