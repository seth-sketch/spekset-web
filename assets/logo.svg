<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 30 1380 452" width="1380" height="452">
  <!--
    speKset logo — Option A dark
    Font: Arial Black (system) / Syne 800 fallback
    K: #4A8FFF  |  Bracket: #4A8FFF  |  BG: #050505
  -->
  <style>
    .brand { font-family:'Arial Black',Arial,sans-serif; font-weight:800; font-size:190px; letter-spacing:-6px; }
    .tag   { font-family:'Courier New',monospace; font-size:34px; letter-spacing:9px; fill:rgba(255,255,255,0.5); }
  </style>

  <!-- Dark panel -->
  <rect x="15" y="35" width="1370" height="440" rx="20" fill="#050505"/>

  <!-- Bracket: top bar, left leg, partial bottom -->
  <line x1="150" y1="90"  x2="1170" y2="90"  stroke="#4A8FFF" stroke-width="4" stroke-linecap="square"/>
  <line x1="150" y1="90"  x2="150"  y2="398" stroke="#4A8FFF" stroke-width="4" stroke-linecap="square"/>
  <line x1="150" y1="398" x2="760"  y2="398" stroke="#4A8FFF" stroke-width="4" stroke-linecap="square"/>

  <!-- Wordmark — single text element, K gets its own fill via tspan -->
  <text class="brand" x="230" y="275" fill="#ffffff">spe<tspan fill="#3a51a3">K</tspan>set</text>

  <!-- Tagline -->
  <text class="tag" x="190" y="368">SPEC</text>
  <line x1="338" y1="351" x2="388" y2="351" stroke="#4A8FFF" stroke-width="2" stroke-linecap="square"/>
  <text class="tag" x="404" y="368">BUILD</text>
  <line x1="603" y1="351" x2="653" y2="351" stroke="#4A8FFF" stroke-width="2" stroke-linecap="square"/>
  <text class="tag" x="672" y="368">SHIP</text>
</svg>
