  <line x1="150" y1="90" x2="150" y2="398" stroke="#4a8fff" stroke-width="4" stroke-linecap="square"/>
  <line x1="150" y1="398" x2="760" y2="398" stroke="#4a8fff" stroke-width="4" stroke-linecap="square"/>

  <!-- Wordmark: spe (white) K (navy) set (white) -->
  <text transform="translate(230,275)"
